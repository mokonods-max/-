<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>روز بغداد | تفاصيل المنتج</title>
  <link rel="stylesheet" href="assets/css/shared.css" />
  <style>
    .pdp { max-width:1400px; margin:0 auto; padding:120px clamp(20px,4vw,64px) 96px; }
    .pdp-back {
      display:inline-flex; align-items:center; gap:8px;
      color:var(--text-secondary); font-size:0.85rem;
      margin-bottom:48px; transition:color 0.3s ease;
    }
    .pdp-back:hover { color:var(--gold); }
    .pdp-grid {
      display:grid; grid-template-columns:1fr;
      gap:clamp(32px,5vw,72px); align-items:start;
    }
    @media (min-width:1024px) { .pdp-grid { grid-template-columns:1fr 1fr; } }
    .pdp-gallery { position:sticky; top:100px; }
    .pdp-image {
      width:100%; max-width:480px; height:500px;
      object-fit:cover; border-radius:var(--radius-lg);
      box-shadow:var(--shadow-xl);
      background:linear-gradient(160deg,var(--cream),#ece8e0);
      display:block; margin:0 auto;
    }
    .pdp-thumbs { display:flex; gap:10px; margin-top:16px; justify-content:center; }
    .pdp-thumb {
      width:72px; height:90px; object-fit:cover;
      border-radius:var(--radius-sm); cursor:pointer;
      border:2px solid transparent; opacity:0.5;
      transition:all 0.3s ease;
    }
    .pdp-thumb.active, .pdp-thumb:hover { opacity:1; border-color:var(--gold); }
    .pdp-info { display:flex; flex-direction:column; gap:24px; }
    .pdp-badge {
      display:inline-block; padding:6px 18px;
      font-size:0.72rem; font-weight:700; letter-spacing:0.08em;
      border-radius:4px; width:fit-content;
    }
    .pdp-badge.bestseller { background:var(--dark); color:var(--gold-light); }
    .pdp-badge.new { background:var(--gold); color:var(--dark); }
    .pdp-badge.limited { background:var(--dark-4); color:var(--gold-light); }
    .pdp-name {
      font-family:var(--font-display); font-size:clamp(2rem,4vw,3rem);
      font-weight:400; line-height:1.15;
    }
    [dir="rtl"] .pdp-name { font-family:var(--font-ar); font-weight:300; }
    .pdp-rating { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .pdp-stars { color:var(--gold); font-size:1.05rem; }
    .pdp-review-count { color:var(--text-secondary); font-size:0.85rem; }
    .pdp-hr { width:100%; height:1px; background:var(--border); }
    .pdp-price {
      font-family:'Inter',sans-serif; font-size:1.8rem; font-weight:700; color:var(--gold);
    }
    .pdp-price-old {
      font-size:1.1rem; color:var(--text-secondary);
      text-decoration:line-through; margin-inline-start:12px;
    }
    .pdp-desc {
      font-size:0.95rem; line-height:1.9; color:rgba(26,23,20,0.65);
    }
    .pdp-tags { display:flex; flex-wrap:wrap; gap:8px; }
    .pdp-tag {
      padding:6px 16px; border:1px solid var(--border);
      border-radius:100px; font-size:0.78rem; color:var(--text-secondary);
    }
    .pdp-actions { display:flex; gap:12px; flex-wrap:wrap; align-items:stretch; }
    .pdp-qty {
      display:flex; align-items:center;
      border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden;
    }
    .pdp-qty-btn {
      width:48px; height:54px; display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; color:var(--text); transition:background 0.2s ease;
    }
    .pdp-qty-btn:hover { background:var(--gold-muted); }
    .pdp-qty-val {
      width:56px; text-align:center; font-size:0.95rem; font-weight:600;
      font-family:'Inter',sans-serif; border-inline:1px solid var(--border);
      line-height:54px;
    }
    .pdp-add-btn {
      flex:1; min-width:220px; padding:16px 32px;
      background:var(--dark); color:var(--gold-light);
      font-size:1rem; font-weight:700; border-radius:var(--radius-sm);
      display:flex; align-items:center; justify-content:center; gap:12px;
      transition:all 0.35s var(--ease);
    }
    .pdp-add-btn:hover { background:var(--gold); color:var(--dark); transform:translateY(-2px); box-shadow:var(--shadow-lg); }
    .pdp-wish-btn {
      width:54px; height:54px; border:1px solid var(--border);
      border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center;
      color:var(--gold); transition:all 0.3s ease;
    }
    .pdp-wish-btn:hover { background:var(--gold-muted); }
    .pdp-shipping {
      display:flex; flex-direction:column; gap:14px;
      padding:24px; border:1px solid var(--border);
      border-radius:var(--radius-md); background:rgba(179,157,114,0.03);
    }
    .pdp-ship-row {
      display:flex; align-items:center; gap:14px;
      font-size:0.85rem; color:var(--text-secondary);
    }
    .pdp-ship-row svg { color:var(--gold); flex-shrink:0; }
    .pdp-reviews-section { margin-top:80px; }
    .pdp-reviews-section h2 {
      font-family:var(--font-display); font-size:1.6rem; font-weight:400;
      padding-bottom:20px; border-bottom:1px solid var(--border); margin-bottom:32px;
    }
    [dir="rtl"] .pdp-reviews-section h2 { font-family:var(--font-ar); }
    .rev { padding:24px 0; border-bottom:1px solid rgba(179,157,114,0.08); }
    .rev-header { display:flex; align-items:center; gap:14px; margin-bottom:10px; }
    .rev-avatar {
      width:40px; height:40px; border-radius:50%; flex-shrink:0;
      background:var(--gold-muted); display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:0.8rem; color:var(--gold); font-family:'Inter',sans-serif;
    }
    .rev-name { font-weight:600; font-size:0.9rem; }
    .rev-date { font-size:0.75rem; color:var(--text-secondary); }
    .rev-stars { color:var(--gold); font-size:0.82rem; margin-bottom:8px; }
    .rev-text { font-size:0.88rem; line-height:1.8; color:rgba(26,23,20,0.6); }
    .pdp-related { margin-top:96px; }
    .pdp-related h2 {
      font-family:var(--font-display); font-size:1.6rem; font-weight:400;
      margin-bottom:40px;
    }
    [dir="rtl"] .pdp-related h2 { font-family:var(--font-ar); }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar scrolled">
  <div class="navbar-inner">
    <a href="index.html" class="nav-logo">
      <img src="assets/images/logo_transparent.png" alt="Rose Baghdad" class="nav-logo-img" />
      <div class="nav-logo-text"><div class="nav-logo-name">ROSE BAGHDAD</div><div class="nav-logo-sub">للعطور والبخور</div></div>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav_home">الرئيسية</a></li>
      <li><a href="shop.html" data-i18n="nav_collection">المجموعة</a></li>
      <li><a href="index.html#about" data-i18n="nav_story">قصتنا</a></li>
      <li><a href="index.html#contact" data-i18n="nav_contact">تواصل معنا</a></li>
    </ul>
    <div class="nav-actions">
      <button class="lang-toggle">EN</button>
      <button class="nav-btn cart-trigger" aria-label="Cart">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge">0</span>
      </button>
      <button class="hamburger" id="mob-open" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<!-- Mobile -->
<div class="mobile-overlay" id="mob-overlay"></div>
<div class="mobile-drawer" id="mob-drawer">
  <button class="mobile-close" id="mob-close"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  <nav class="mobile-nav"><a href="index.html">الرئيسية</a><a href="shop.html">المجموعة</a></nav>
  <div class="mobile-footer"><button class="lang-toggle">EN</button></div>
</div>

<!-- Cart Drawer -->
<div class="cart-overlay" id="cart-overlay"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-drawer-header">
    <h2 class="cart-drawer-title" id="cart-title-text">سلة التسوق</h2>
    <button class="cart-close" id="cart-close"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-drawer-footer" id="cart-footer" style="display:none;">
    <div class="cart-total-row"><span class="cart-total-label" id="cart-total-lbl">المجموع</span><span class="cart-total-value" id="cart-total-val">0</span></div>
    <button class="btn-checkout" id="cart-checkout-btn">إتمام الشراء</button>
  </div>
</div>

<!-- PDP -->
<main class="pdp" id="pdp-main"></main>

<!-- FOOTER -->
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-grid">
      <div>
        <img src="assets/images/logo_transparent.png" alt="Rose Baghdad" class="footer-logo" />
        <p class="footer-desc">روز بغداد — تأسست بكل حب في بغداد، ٢٠٢٢.</p>
      </div>
      <div>
        <div class="footer-heading">روابط سريعة</div>
        <ul class="footer-links"><li><a href="index.html">الرئيسية</a></li><li><a href="shop.html">المجموعة</a></li></ul>
      </div>
    </div>
    <div class="footer-bottom"><span class="footer-copy">© 2026 روز بغداد. جميع الحقوق محفوظة.</span></div>
  </div>
</footer>

<script src="js/app.js"></script>
<script>
const pid = parseInt(new URLSearchParams(location.search).get('id'));
let qty = 1;

function renderPDP() {
  const lang = Lang.current;
  const t = Lang.t;
  const p = PRODUCTS.find(x => x.id === pid);
  const main = document.getElementById('pdp-main');

  if (!p) {
    main.innerHTML = `<div style="text-align:center;padding:120px 0;"><h2 style="font-size:1.8rem;margin-bottom:16px;">المنتج غير موجود</h2><a href="shop.html" class="btn-primary" style="display:inline-flex;">المجموعة</a></div>`;
    return;
  }

  const name = lang==='en' ? p.nameEn : p.nameAr;
  const desc = lang==='en' ? p.longEn : p.longAr;
  document.title = `روز بغداد | ${name}`;

  const related = PRODUCTS.filter(x => x.category === p.category && x.id !== p.id).slice(0,4);
  const reviews = [
    { i:'AK', n:lang==='en'?'Ahmed K.':'أحمد كريم', d:lang==='en'?'March 2026':'مارس ٢٠٢٦', r:5, t:lang==='en'?`The ${p.nameEn} exceeded all expectations. Truly magnificent.`:`${p.nameAr} فاق كل التوقعات. رائع حقاً.` },
    { i:'NA', n:lang==='en'?'Nour A.':'نور أحمد', d:lang==='en'?'April 2026':'أبريل ٢٠٢٦', r:5, t:lang==='en'?'Exquisite packaging and long-lasting fragrance. Highly recommended.':'تغليف رائع وعطر يدوم طويلاً. أنصح به.' },
    { i:'FS', n:lang==='en'?'Fatima S.':'فاطمة سعيد', d:lang==='en'?'May 2026':'مايو ٢٠٢٦', r:p.rating, t:lang==='en'?'A truly premium product. The quality is unmistakable.':'منتج فاخر حقاً. الجودة واضحة.' },
  ];

  main.innerHTML = `
    <a href="shop.html" class="pdp-back">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      ${t.pdp_back}
    </a>
    <div class="pdp-grid">
      <div class="pdp-gallery">
        <img id="main-img" src="${p.image}" alt="${name}" class="pdp-image" />
        <div class="pdp-thumbs">
          ${[1,2,3,4].map((_,i) => `<img src="${p.image}" alt="${name}" class="pdp-thumb ${i===0?'active':''}" onclick="document.getElementById('main-img').src=this.src;document.querySelectorAll('.pdp-thumb').forEach(t=>t.classList.remove('active'));this.classList.add('active');" />`).join('')}
        </div>
      </div>
      <div class="pdp-info">
        ${p.badge ? `<span class="pdp-badge ${p.badge}">${{bestseller:lang==='en'?'Bestseller':'الأكثر مبيعاً',new:lang==='en'?'New':'جديد',limited:lang==='en'?'Limited':'إصدار محدود'}[p.badge]}</span>` : ''}
        <h1 class="pdp-name">${name}</h1>
        <div class="pdp-rating">
          <span class="pdp-stars">${stars(p.rating)}</span>
          <span class="pdp-review-count">${p.reviews} ${t.pdp_reviews}</span>
        </div>
        <div class="pdp-hr"></div>
        <div><span class="pdp-price">${formatPrice(p.price)}</span>${p.originalPrice ? `<span class="pdp-price-old">${formatPrice(p.originalPrice)}</span>` : ''}</div>
        <p class="pdp-desc">${desc}</p>
        <div class="pdp-tags">${p.tags.map(tag=>`<span class="pdp-tag">${tag}</span>`).join('')}</div>
        <div class="pdp-hr"></div>
        <div class="pdp-actions">
          <div class="pdp-qty">
            <button class="pdp-qty-btn" onclick="qty=Math.max(1,qty-1);document.getElementById('qv').textContent=qty;">−</button>
            <span class="pdp-qty-val" id="qv">1</span>
            <button class="pdp-qty-btn" onclick="qty++;document.getElementById('qv').textContent=qty;">+</button>
          </div>
          <button class="pdp-add-btn" id="add-btn" onclick="for(let i=0;i<qty;i++)Cart.add(${p.id});showToast(t.cart_added+': ${name} (×'+qty+')');">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            <span>${t.add_cart}</span>
          </button>
          <button class="pdp-wish-btn" onclick="this.style.background='var(--gold-muted)';">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
          </button>
        </div>
        <div class="pdp-shipping">
          <div class="pdp-ship-row"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg><span>${lang==='en'?'Free delivery on orders over 100,000 IQD':'توصيل مجاني للطلبات فوق ١٠٠,٠٠٠ د.ع'}</span></div>
          <div class="pdp-ship-row"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>${lang==='en'?'100% authentic ingredients':'مكونات أصيلة ١٠٠٪'}</span></div>
          <div class="pdp-ship-row"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg><span>${lang==='en'?'Easy returns within 7 days':'إرجاع سهل خلال ٧ أيام'}</span></div>
        </div>
      </div>
    </div>
    <div class="pdp-reviews-section">
      <h2>${lang==='en'?`Customer Reviews (${p.reviews})`:`تقييمات العملاء (${p.reviews})`}</h2>
      ${reviews.map(r => `<div class="rev"><div class="rev-header"><div class="rev-avatar">${r.i}</div><div><div class="rev-name">${r.n}</div><div class="rev-date">${r.d}</div></div></div><div class="rev-stars">${stars(r.r)}</div><p class="rev-text">${r.t}</p></div>`).join('')}
    </div>
    ${related.length ? `<div class="pdp-related"><h2>${lang==='en'?'You Might Also Like':'قد يعجبك أيضاً'}</h2><div class="products-grid">${related.map(r=>buildCard(r)).join('')}</div></div>`:''}
  `;
}

document.addEventListener('lang:change', renderPDP);
renderPDP();
</script>
</body>
</html>
