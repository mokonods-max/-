<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>روز بغداد | تفاصيل المنتج</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/shared.css" />
  <style>
    /* ─── PDP LAYOUT ─── */
    .pdp-wrapper {
      max-width: 1280px; margin: 0 auto;
      padding: 140px 48px 96px;
    }
    @media (max-width: 768px) { .pdp-wrapper { padding: 120px 20px 64px; } }

    .pdp-back {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--text-muted); font-size: 0.88rem;
      text-decoration: none; font-family: 'Cairo', sans-serif;
      margin-bottom: 40px; transition: color 0.3s ease;
    }
    .pdp-back:hover { color: var(--gold); }

    .pdp-grid {
      display: grid; grid-template-columns: 1fr;
      gap: 56px; align-items: start;
    }
    @media (min-width: 1024px) { .pdp-grid { grid-template-columns: 1fr 1fr; } }

    /* ─── GALLERY ─── */
    .pdp-gallery {
      position: sticky; top: 100px;
    }
    .pdp-main-image {
      width: 100%; aspect-ratio: 3/4;
      object-fit: cover;
      background: linear-gradient(145deg, var(--cream), #e8e2d8);
      display: block;
      border: 1px solid rgba(179,157,114,0.15);
    }
    .pdp-thumbs {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-top: 12px;
    }
    .pdp-thumb {
      aspect-ratio: 1; object-fit: cover; cursor: pointer;
      border: 1px solid rgba(179,157,114,0.2);
      opacity: 0.6; transition: all 0.3s ease;
    }
    .pdp-thumb.active, .pdp-thumb:hover { opacity: 1; border-color: var(--gold); }

    /* ─── PRODUCT INFO ─── */
    .pdp-info { display: flex; flex-direction: column; gap: 24px; }

    .pdp-badge {
      display: inline-block; padding: 5px 16px;
      font-size: 0.75rem; font-family: 'Tajawal', sans-serif; font-weight: 600;
      letter-spacing: 0.05em;
    }
    .pdp-name {
      font-family: 'AcuminVariableConcept', 'Tajawal', sans-serif;
      font-size: clamp(2rem, 4vw, 3rem); font-weight: 300;
      color: var(--dark); line-height: 1.1;
    }
    .pdp-rating-row {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .pdp-stars { color: var(--gold); font-size: 1.1rem; }
    .pdp-review-count { color: var(--text-muted); font-size: 0.85rem; font-family: 'Cairo', sans-serif; }
    .pdp-divider { width: 100%; height: 1px; background: rgba(179,157,114,0.2); }
    .pdp-price {
      font-size: 1.8rem; font-weight: 700;
      color: var(--gold); font-family: 'HelveticaNeue', sans-serif;
    }
    .pdp-original-price {
      font-size: 1.1rem; color: rgba(61,54,39,0.35);
      text-decoration: line-through; font-family: 'HelveticaNeue', sans-serif;
      margin-inline-start: 10px;
    }
    .pdp-desc {
      font-size: 0.95rem; line-height: 1.85;
      color: rgba(61,54,39,0.75); font-family: 'Cairo', sans-serif;
    }
    .pdp-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .pdp-tag {
      padding: 5px 14px; border: 1px solid rgba(179,157,114,0.3);
      font-size: 0.78rem; color: var(--text-muted); font-family: 'Cairo', sans-serif;
      border-radius: 2px;
    }

    /* ─── QTY + ADD ─── */
    .pdp-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .qty-wrap {
      display: flex; align-items: center;
      border: 1px solid rgba(179,157,114,0.4);
    }
    .qty-btn {
      width: 44px; height: 50px;
      background: none; border: none; cursor: pointer;
      font-size: 1.2rem; color: var(--dark);
      transition: background 0.2s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-btn:hover { background: rgba(179,157,114,0.1); }
    .qty-display {
      width: 52px; text-align: center;
      font-family: 'HelveticaNeue', sans-serif; font-size: 1rem;
      border-inline: 1px solid rgba(179,157,114,0.25);
      height: 50px; display: flex; align-items: center; justify-content: center;
    }
    .btn-add-cart {
      flex: 1; min-width: 200px;
      background: var(--gold); color: var(--dark);
      border: none; padding: 15px 28px;
      font-family: 'Tajawal', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-add-cart:hover { background: var(--dark); color: var(--gold-light); }
    .btn-wishlist-pdp {
      width: 52px; height: 50px;
      border: 1px solid rgba(179,157,114,0.4); background: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s ease; color: var(--gold);
    }
    .btn-wishlist-pdp:hover { background: rgba(179,157,114,0.1); }

    /* ─── SHIPPING INFO ─── */
    .pdp-shipping {
      display: flex; flex-direction: column; gap: 12px;
      padding: 20px; border: 1px solid rgba(179,157,114,0.2);
      background: rgba(179,157,114,0.04);
    }
    .pdp-ship-row {
      display: flex; align-items: center; gap: 12px;
      font-size: 0.85rem; font-family: 'Cairo', sans-serif; color: var(--text-muted);
    }
    .pdp-ship-row svg { color: var(--gold); flex-shrink: 0; }

    /* ─── REVIEWS ─── */
    .pdp-reviews { margin-top: 64px; }
    .pdp-reviews h2 {
      font-family: 'AcuminVariableConcept', 'Tajawal', sans-serif;
      font-size: 1.8rem; font-weight: 300; margin-bottom: 28px;
      padding-bottom: 16px; border-bottom: 1px solid rgba(179,157,114,0.2);
    }
    .review-item {
      padding: 24px 0; border-bottom: 1px solid rgba(179,157,114,0.12);
    }
    .review-header { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
    .review-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(179,157,114,0.15);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem; color: var(--gold);
      font-family: 'HelveticaNeue', sans-serif; flex-shrink: 0;
    }
    .review-meta-name { font-weight: 700; font-size: 0.92rem; }
    .review-meta-date { font-size: 0.75rem; color: var(--text-muted); font-family: 'Cairo', sans-serif; }
    .review-stars { color: var(--gold); font-size: 0.85rem; margin-bottom: 8px; }
    .review-text { font-size: 0.88rem; line-height: 1.8; color: rgba(61,54,39,0.7); font-family: 'Cairo', sans-serif; }

    /* ─── RELATED ─── */
    .pdp-related { margin-top: 80px; }
    .pdp-related h2 {
      font-family: 'AcuminVariableConcept', 'Tajawal', sans-serif;
      font-size: 1.8rem; font-weight: 300; margin-bottom: 32px;
      color: var(--dark);
    }

    /* ─── NOT FOUND ─── */
    .not-found {
      text-align: center; padding: 120px 48px;
      font-family: 'Cairo', sans-serif; color: var(--text-muted);
    }
    .not-found h2 { font-size: 2rem; color: var(--dark); margin-bottom: 16px; }
  </style>
</head>
<body>

<!-- ══════════════════════════════ PDP MAIN CONTENT ══════════════════════════════ -->
<main class="pdp-wrapper" id="pdp-main">
  <!-- Rendered by JS below -->
</main>


<!-- ══════════════════════════════ FOOTER ══════════════════════════════ -->
<footer class="site-footer">
  <div class="footer-grid">

      <img src="assets/images/logo_transparent.png" alt="Rose Baghdad" class="footer-logo-img" />

<script src="js/app.js"></script>
<script>
// ─── Get product ID from URL ──────────────────────────
const params   = new URLSearchParams(window.location.search);
const productId = parseInt(params.get('id'));
let qty = 1;

function renderPDP() {
  const lang    = RBLang.current;
  const t       = RBLang.t;
  const product = RB_PRODUCTS.find(p => p.id === productId);
  const main    = document.getElementById('pdp-main');

  if (!product) {
    main.innerHTML = `
      <div class="not-found">
        <h2>المنتج غير موجود</h2>
        <p>يبدو أن هذا المنتج غير موجود. عد إلى المتجر لاستكشاف مجموعتنا.</p>
        <a href="shop.html" class="btn-primary" style="margin-top:24px;display:inline-flex;color:#3d3627;">
          <span data-i18n="nav_collection">المجموعة</span>
        </a>
      </div>`;
    return;
  }

  // Update page title
  const name     = lang === 'en' ? product.nameEn    : product.nameAr;
  const desc     = lang === 'en' ? product.longDescEn : product.longDescAr;
  const badge    = lang === 'en' ? product.badgeEn    : product.badgeAr;
  const backText = t.pdp_back;
  document.title = `روز بغداد | ${name}`;

  const badgeStyle = product.badge === 'bestseller'
    ? 'background:#3d3627;color:#f5d79d;'
    : product.badge === 'limited'
    ? 'background:#524834;color:#f5d79d;'
    : 'background:#b39d72;color:#f5f2ed;';

  // Related products (same category, excluding current)
  const related = RB_PRODUCTS.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);

  // Sample reviews
  const reviews = [
    { initials:'AK', name: lang==='en'?'Ahmed K.':'أحمد كريم', date: lang==='en'?'March 2026':'مارس ٢٠٢٦', rating:5, text: lang==='en'?`Absolutely incredible. The ${product.nameEn} is unlike anything I have experienced.`:`رائع تماماً. ${product.nameAr} لا يشبه أي شيء جربته من قبل.` },
    { initials:'NA', name: lang==='en'?'Nour A.':'نور أحمد', date: lang==='en'?'April 2026':'أبريل ٢٠٢٦', rating:5, text: lang==='en'?'The packaging is exquisite and the fragrance lasts all day. Highly recommended.':'التغليف رائع والعطر يدوم طوال اليوم. أنصح به بشدة.' },
    { initials:'FS', name: lang==='en'?'Fatima S.':'فاطمة سعيد', date: lang==='en'?'May 2026':'مايو ٢٠٢٦', rating:product.rating, text: lang==='en'?'A truly premium product. The quality speaks for itself.':'منتج راقٍ حقاً. الجودة تتحدث عن نفسها.' },
  ];

  main.innerHTML = `
    <a href="shop.html" class="pdp-back">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      ${backText}
    </a>

    <!-- Breadcrumb -->
    <div style="font-size:0.8rem;color:var(--text-muted);font-family:'Cairo',sans-serif;margin-bottom:32px;display:flex;gap:8px;align-items:center;">
      <a href="index.html" style="color:var(--gold);text-decoration:none;" data-i18n="nav_home">${t.nav_home}</a>
      <span>›</span>
      <a href="shop.html" style="color:var(--gold);text-decoration:none;" data-i18n="nav_collection">${t.nav_collection}</a>
      <span>›</span>
      <span>${name}</span>
    </div>

    <!-- Main PDP Grid -->
    <div class="pdp-grid">

      <!-- GALLERY -->
      <div class="pdp-gallery">
        <img id="pdp-main-img" src="${product.image}" alt="${name}" class="pdp-main-image" />
        <div class="pdp-thumbs">
          ${[product.image, product.image, product.image, product.image].map((img,i) => `
            <img src="${img}" alt="${name}" class="pdp-thumb ${i===0?'active':''}" onclick="setThumb(this,'${img}')" />
          `).join('')}
        </div>
      </div>

      <!-- PRODUCT INFO -->
      <div class="pdp-info">
        ${badge ? `<span class="pdp-badge" style="${badgeStyle}">${badge}</span>` : ''}

        <h1 class="pdp-name">${name}</h1>

        <div class="pdp-rating-row">
          <span class="pdp-stars">${RBUtils.stars(product.rating)}</span>
          <span class="pdp-review-count">${product.reviews} ${t.pdp_reviews}</span>
        </div>

        <div class="pdp-divider"></div>

        <div>
          <span class="pdp-price">${RBUtils.formatPrice(product.price, lang)}</span>
          ${product.originalPrice ? `<span class="pdp-original-price">${RBUtils.formatPrice(product.originalPrice, lang)}</span>` : ''}
        </div>

        <p class="pdp-desc">${desc}</p>

        <div class="pdp-tags">
          ${product.tags.map(tag => `<span class="pdp-tag">${tag}</span>`).join('')}
        </div>

        <div class="pdp-divider"></div>

        <!-- QTY + ADD TO CART -->
        <div class="pdp-actions">
          <div class="qty-wrap">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <div class="qty-display" id="qty-display">1</div>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
          <button class="btn-add-cart" id="add-cart-btn" onclick="doAddToCart(${product.id},'${name}')">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            <span data-i18n="pdp_add_cart">${t.pdp_add_cart}</span>
          </button>
          <button class="btn-wishlist-pdp" aria-label="Wishlist" onclick="this.style.color='#b39d72'; this.style.background='rgba(179,157,114,0.12)';">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
          </button>
        </div>

        <!-- SHIPPING INFO -->
        <div class="pdp-shipping">
          <div class="pdp-ship-row">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
            <span>${lang==='en'?'Free delivery on orders over 100,000 IQD':'توصيل مجاني للطلبات فوق ١٠٠,٠٠٠ د.ع'}</span>
          </div>
          <div class="pdp-ship-row">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span>${lang==='en'?'100% authentic, natural ingredients':'مكونات طبيعية ١٠٠٪ وأصيلة'}</span>
          </div>
          <div class="pdp-ship-row">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
            <span>${lang==='en'?'Easy returns within 7 days':'إرجاع سهل خلال ٧ أيام'}</span>
          </div>
        </div>

      </div>
    </div>

    <!-- REVIEWS -->
    <div class="pdp-reviews">
      <h2>${lang==='en'?`Customer Reviews (${product.reviews})`:`تقييمات العملاء (${product.reviews})`}</h2>
      ${reviews.map(r => `
        <div class="review-item">
          <div class="review-header">
            <div class="review-avatar">${r.initials}</div>
            <div>
              <div class="review-meta-name">${r.name}</div>
              <div class="review-meta-date">${r.date}</div>
            </div>
          </div>
          <div class="review-stars">${RBUtils.stars(r.rating)}</div>
          <p class="review-text">${r.text}</p>
        </div>
      `).join('')}
    </div>

    <!-- RELATED -->
    ${related.length > 0 ? `
    <div class="pdp-related">
      <h2>${lang==='en'?'You Might Also Like':'قد يعجبك أيضاً'}</h2>
      <div class="products-grid">
        ${related.map((p,i) => {
          const cardWrapper = document.createElement('div');
          cardWrapper.innerHTML = RBUtils.buildCard(p, lang);
          const cardEl = cardWrapper.firstElementChild;
          // We'll set onclick via JS after insertion; for now embed it in the string
          return `<div data-related-id="${p.id}" style="animation-delay:${i*0.08}s;">${RBUtils.buildCard(p, lang)}</div>`;
        }).join('')}
      </div>
    </div>` : ''}
  `;

  // Attach related card click handlers
  document.querySelectorAll('[data-related-id]').forEach(wrapper => {
    const pid = parseInt(wrapper.dataset.relatedId);
    wrapper.style.cursor = 'pointer';
    wrapper.addEventListener('click', () => {
      window.location.href = `product.html?id=${pid}`;
    });
  });
}

function setThumb(el, src) {
  document.querySelectorAll('.pdp-thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pdp-main-img').src = src;
}

function changeQty(delta) {
  qty = Math.max(1, qty + delta);
  document.getElementById('qty-display').textContent = qty;
}

function doAddToCart(id, name) {
  for (let i = 0; i < qty; i++) RBCart.add(id);
  const t = RBLang.t;
  RBUtils.showToast(`${t.cart_added}: ${name} (×${qty})`);

  // Button feedback
  const btn = document.getElementById('add-cart-btn');
  btn.style.background = '#3d3627';
  btn.style.color = '#f5d79d';
  setTimeout(() => { btn.style.background = ''; btn.style.color = ''; }, 1500);
}

// Language change
document.addEventListener('rb:langchange', renderPDP);

renderPDP();
</script>
</body>
</html>
